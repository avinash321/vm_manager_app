<link rel="stylesheet" href="/static/style.css">

<h1>VM Manager App</h1>

<a href="/create">Create VM</a>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Status</th>
        <th>OS</th>
        <th>Actions</th>
    </tr>

    {% for vm in vms %}
    <tr>
        <td>{{ vm.id }}</td>
        <td>{{ vm.name }}</td>
        <td>{{ vm.status }}</td>
        <td>{{ vm.os }}</td>
        <td>
            <a href="/update/{{ vm.id }}">Edit</a>
            <a href="/delete/{{ vm.id }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
