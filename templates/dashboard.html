{% extends "base.html" %}
{% block content %}

<h2>VM Dashboard</h2>

<form class="row mb-3">
    <input class="form-control col" name="name" placeholder="Search by name">
    <select class="form-control col" name="status">
        <option value="">Status</option>
        <option value="running">Running</option>
        <option value="stopped">Stopped</option>
    </select>
    <button class="btn btn-info col">Filter</button>
</form>

<a href="/create" class="btn btn-success mb-3">Create VM</a>

<table class="table table-dark table-striped">
    <tr>
        <th>ID</th><th>Name</th><th>Status</th><th>OS</th><th>Actions</th>
    </tr>

    {% for vm in vms %}
    <tr>
        <td>{{ vm.id }}</td>
        <td>{{ vm.name }}</td>
        <td>{{ vm.status }}</td>
        <td>{{ vm.os }}</td>
        <td>
            <a href="/update/{{ vm.id }}" class="btn btn-warning btn-sm">Edit</a>
            <a href="/delete/{{ vm.id }}" class="btn btn-danger btn-sm">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

<div class="d-flex justify-content-between">
    <a href="/dashboard?skip={{ skip-10 }}" class="btn btn-secondary">Prev</a>
    <a href="/dashboard?skip={{ skip+10 }}" class="btn btn-secondary">Next</a>
</div>

{% endblock %}
